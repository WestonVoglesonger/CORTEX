device:
  name: "Raspberry Pi 4 Model B"
  adapters: [native]
  peak_gflops: 13.5         # 4× Cortex-A72 @ 1.8 GHz, ~2 FLOP/cycle NEON
  cpu_peak_gflops: 13.5     # CPU only (no discrete GPU for compute)
  memory_bandwidth_gb_s: 8.5   # LPDDR4-3200 32-bit
  l1_cache_kb: 48           # 48 KB per core (32 data + 16 inst)
  l2_cache_kb: 1024         # 1 MB shared
  frequency:
    model: dvfs
    max_hz: 1800000000
    per_sample: false
  pmu:
    instruction_count: true
    l1d_misses: true
    memory_stall_hierarchy: false
    backend_stall: true
  os_noise:
    tracer: osnoise
