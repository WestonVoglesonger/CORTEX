device:
  name: "Apple M1 (macOS)"
  adapters: [native]
  frequency:
    model: fixed
    max_hz: 3228000000
    per_sample: false
  pmu:
    instruction_count: true  # kpc framework (FIXED_INSTRUCTIONS)
    l1d_misses: false        # Not exposed via kpc public API
    memory_stall_hierarchy: false
    backend_stall: true      # kpc configurable counter (MAP_STALL_DISPATCH 0x70)
  os_noise:
    tracer: null             # No osnoise tracer on macOS
