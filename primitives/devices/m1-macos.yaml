device:
  name: "Apple M1 (macOS)"
  adapters: [native]
  peak_gflops: 2600.0       # ~2.6 TFLOPS FP32 (GPU), CPU ~100 GFLOPS
  cpu_peak_gflops: 100.0    # 4 Firestorm cores × ~3.2 GHz × 8 FLOP/cycle
  memory_bandwidth_gb_s: 68.25  # LPDDR4X unified memory
  l1_cache_kb: 192          # 192 KB per Firestorm core (128 data + 64 inst)
  l2_cache_kb: 12288        # 12 MB shared L2
  frequency:
    model: fixed
    max_hz: 3228000000
    per_sample: false
  pmu:
    instruction_count: true  # kpc framework (FIXED_INSTRUCTIONS)
    l1d_misses: false        # Not exposed via kpc public API
    memory_stall_hierarchy: false
    backend_stall: true      # kpc configurable counter (MAP_STALL_DISPATCH 0x70)
  os_noise:
    tracer: null             # No osnoise tracer on macOS
