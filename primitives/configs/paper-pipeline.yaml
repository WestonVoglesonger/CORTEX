cortex_version: 1

system:
  name: "paper-pipeline"
  description: "Paper evaluation: realistic BCI pipeline chains on Apple M1"

dataset:
  path: "primitives/datasets/v1/physionet-motor-imagery/converted/S001R03.float32"
  format: "float32"
  channels: 64
  sample_rate_hz: 160

realtime:
  scheduler: fifo
  priority: 90
  cpu_affinity: [0]
  deadline_ms: 500

power:
  governor: "performance"
  turbo: false

benchmark:
  metrics: [latency, jitter, throughput, memory_usage]
  parameters:
    duration_seconds: 120
    repeats: 5
    warmup_seconds: 10
  load_profile: "medium"

output:
  directory: "results"
  format: "ndjson"
  include_raw_data: false

pipelines:
  - name: preprocessing
    kernels: [notch_iir, bandpass_fir, car]
  - name: spectral-analysis
    kernels: [bandpass_fir, fft, welch_psd]
  - name: motor-imagery
    kernels: [bandpass_fir, car, goertzel]
