cortex_version: 1

system:
  name: "paper-cross-platform"
  description: "Paper evaluation: uniform config for macOS vs Asahi Linux comparison. Device set via --device flag."

dataset:
  path: "primitives/datasets/v1/physionet-motor-imagery/converted/S001R03.float32"
  format: "float32"
  channels: 64
  sample_rate_hz: 160

realtime:
  scheduler: fifo
  priority: 90
  cpu_affinity: [0]
  deadline_ms: 500           # hop(80)/Fs(160) = 0.5s

power:
  governor: "performance"
  turbo: false

benchmark:
  metrics: [latency, jitter, throughput, memory_usage]
  parameters:
    duration_seconds: 120
    repeats: 6               # Target N≥700 per kernel for statistical power
    warmup_seconds: 10
  load_profile: "medium"     # N/2 CPUs @ 50% — stabilizes DVFS on macOS

output:
  directory: "results"
  format: "ndjson"
  include_raw_data: false

# No plugins section = auto-detect all built kernels
# All 9 f32 kernels: noop, car, notch_iir, bandpass_fir, goertzel, fft, welch_psd, ica, csp
# CSP/ICA require calibration state — will be included if .cortex_state exists
