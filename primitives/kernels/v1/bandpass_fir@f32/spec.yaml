kernel:
  name: "bandpass_fir"
  version: "1.0.0"
  dtype: "float32"

abi:
  input_shape: [160, null]  # W from spec, C from dataset
  output_shape: [160, null] # W from spec, C from dataset
  stateful: true

numerical:
  tolerances:
    float32:
      rtol: 1.0e-5
      atol: 1.0e-6
    quantized:
      rtol: 1.0e-3
      atol: 1.0e-3

computational:
  flops_per_sample: 128        # FIR with ~64 taps: 2 * 64 = 128 FLOPs (multiply-accumulate)
  memory_loads_per_sample: 2   # input sample + coefficient array (cached)
  memory_stores_per_sample: 1  # output sample

oracle:
  path: "oracle.py"
  function: "fir_bp_ref"
  dependencies: ["scipy"]

