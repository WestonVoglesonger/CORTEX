kernel:
  name: "welch_psd"
  version: "0.1.0"
  dtype: "float32"

abi:
  input_shape: [W, C]
  output_shape: [n_fft/2 + 1, C]
  stateful: false

numerical:
  tolerances:
    float32:
      rtol: 2.0e-3
      atol: 1.0e-4
    quantized:
      rtol: 5.0e-2
      atol: 1.0e-2

oracle:
  path: "oracle.py"
  function: "compute"
  dependencies: ["scipy", "numpy"]
