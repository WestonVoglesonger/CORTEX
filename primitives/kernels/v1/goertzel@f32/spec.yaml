kernel:
  name: "goertzel"
  version: "1.0.0"
  dtype: "float32"

abi:
  input_shape: [160, null]  # W from spec, C from dataset
  output_shape: [2, null]   # B=2 bands from spec, C from dataset
  stateful: false

numerical:
  tolerances:
    float32:
      rtol: 1.0e-5
      atol: 1.0e-6
    quantized:
      rtol: 1.0e-3
      atol: 1.0e-3

computational:
  flops_per_sample: 12         # Goertzel: 2 target freqs × (3 multiply + 3 add) per channel
  memory_loads_per_sample: 1   # input sample
  memory_stores_per_sample: 1  # accumulated state (registers)

oracle:
  path: "oracle.py"
  function: "goertzel_bandpower_ref"
  dependencies: ["numpy"]

