kernel:
  name: "noop"
  version: "1.0.0"
  dtype: "float32"

abi:
  input_shape: [W, C]
  output_shape: [W, C]
  stateful: false

numerical:
  tolerances:
    float32:
      rtol: 1.0e-7
      atol: 1.0e-9
    quantized:
      # Q15 round-trip: C uses round-half-away-from-zero, Python uses
      # round-half-to-even. Differ by 1 Q15 unit (~3.05e-5) on ties.
      rtol: 1.0e-3
      atol: 1.0e-3

oracle:
  path: "oracle.py"
  function: "noop_ref"
  dependencies: ["numpy"]
