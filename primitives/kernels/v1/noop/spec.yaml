kernel:
  name: "noop"
  version: "1.0.0"
  dtype: "float32"

abi:
  input_shape: [W, C]
  output_shape: [W, C]
  stateful: false

numerical:
  tolerances:
    float32:
      rtol: 1.0e-7
      atol: 1.0e-9
    quantized:
      rtol: 1.0e-7
      atol: 1.0e-9

oracle:
  path: "oracle.py"
  function: "noop_ref"
  dependencies: ["numpy"]
