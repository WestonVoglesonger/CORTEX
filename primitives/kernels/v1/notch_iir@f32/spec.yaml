kernel:
  name: "notch_iir"
  version: "1.0.0"
  dtype: "float32"

abi:
  input_shape: [160, null]  # W from spec, C from dataset
  output_shape: [160, null] # W from spec, C from dataset
  stateful: true

numerical:
  tolerances:
    float32:
      rtol: 1.0e-5
      atol: 1.0e-6
    quantized:
      rtol: 1.0e-3
      atol: 1.0e-3

computational:
  flops_per_sample: 10         # 2nd-order IIR: 5 multiply + 4 add + 1 state update per channel
  memory_loads_per_sample: 3   # input + 2 state values (biquad)
  memory_stores_per_sample: 2  # output + state update

oracle:
  path: "oracle.py"
  function: "notch_ref"
  dependencies: ["scipy"]

