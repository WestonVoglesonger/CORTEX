# Computational annotations for roofline analysis (predict/decompose).
#
# Kept OUTSIDE v1/ spec.yaml files to respect the immutability constraint:
#   "Files in primitives/kernels/v{version}/ are NEVER modified after release."
#
# Keyed by kernel name. Values are per-sample counts used by
# src/cortex/utils/decomposition.py to compute operational intensity.

bandpass_fir:
  flops_per_sample: 128        # FIR with ~64 taps: 2 * 64 = 128 FLOPs (multiply-accumulate)
  memory_loads_per_sample: 2   # input sample + coefficient array (cached)
  memory_stores_per_sample: 1  # output sample

car:
  flops_per_sample: 2          # CAR: 1 add (running sum) + 1 subtract (mean) per channel
  memory_loads_per_sample: 1   # input sample
  memory_stores_per_sample: 1  # output sample

csp:
  flops_per_sample: 512        # Spatial filter W*x: 2*C*K = 2*64*4 = 512 per sample
  memory_loads_per_sample: 2   # input vector + filter matrix row
  memory_stores_per_sample: 1  # output component

goertzel:
  flops_per_sample: 12         # Goertzel: 2 target freqs * (3 multiply + 3 add) per channel
  memory_loads_per_sample: 1   # input sample
  memory_stores_per_sample: 1  # accumulated state (registers)

ica:
  flops_per_sample: 8192       # Matrix multiply W*x: 2*C*C = 2*64*64 = 8192 per sample
  memory_loads_per_sample: 2   # input vector + unmixing matrix row
  memory_stores_per_sample: 1  # output component

noop:
  flops_per_sample: 0          # Identity: no computation
  memory_loads_per_sample: 1   # Read input
  memory_stores_per_sample: 1  # Write output (memcpy)

notch_iir:
  flops_per_sample: 10         # 2nd-order IIR: 5 multiply + 4 add + 1 state update per channel
  memory_loads_per_sample: 3   # input + 2 state values (biquad)
  memory_stores_per_sample: 2  # output + state update

welch_psd:
  flops_per_sample: 40         # FFT-dominant: ~5*N*log2(N)/N ~ 40 per sample (N=256)
  memory_loads_per_sample: 2   # input + window coefficients
  memory_stores_per_sample: 1  # PSD output bin
