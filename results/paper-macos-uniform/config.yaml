cortex_version: 1

system:
  name: "paper-macos-full"
  description: "Paper evaluation: all kernels on Apple M1, medium load (DVFS workaround)"

dataset:
  path: "primitives/datasets/v1/physionet-motor-imagery/converted/S001R03.float32"
  format: "float32"
  channels: 64
  sample_rate_hz: 160

realtime:
  scheduler: fifo
  priority: 90
  cpu_affinity: [0]
  deadline_ms: 500

power:
  governor: "performance"
  turbo: false

benchmark:
  metrics: [latency, jitter, throughput, memory_usage]
  parameters:
    duration_seconds: 120
    repeats: 6
    warmup_seconds: 10
  load_profile: "medium"

output:
  directory: "results"
  format: "ndjson"
  include_raw_data: false

# No plugins section = auto-detect all built kernels
# Expected: noop, car, notch_iir, bandpass_fir, goertzel, fft, welch_psd
# CSP/ICA will fail (no calibration state) and be skipped
